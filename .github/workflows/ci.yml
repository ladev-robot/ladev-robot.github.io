name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_URL: https://ladev-robot.github.io/Blog
          NEXT_PUBLIC_EMAIL: hello@example.com
        run: npm run build
